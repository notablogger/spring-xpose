spring.application.name=spring-xpose-sample
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.jpa.open-in-view=false

spring-xpose.mode=REST
spring-xpose.rest-base-path=/api

# Basic auth credentials (used by Category endpoints with AuthType.BASIC)
spring.security.user.name=admin
spring.security.user.password=secret
spring.security.user.roles=USER,ADMIN

# OAuth2 resource server (used by Product endpoints with AuthType.OAUTH2)
# Uncomment and point to your issuer when testing OAuth2 security:
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000
