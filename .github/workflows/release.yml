name: Publish to GitHub Packages
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build all modules
        run: ./gradlew :annotations:build :processor:build :starter:build -Pversion=${{ steps.version.outputs.value }} -x javadoc

      - name: Publish to GitHub Packages
        run: ./gradlew :annotations:publish :processor:publish :starter:publish -Pversion=${{ steps.version.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp annotations/build/libs/annotations-${{ steps.version.outputs.value }}.jar release-artifacts/spring-xpose-annotations-${{ steps.version.outputs.value }}.jar
          cp processor/build/libs/processor-${{ steps.version.outputs.value }}.jar release-artifacts/spring-xpose-processor-${{ steps.version.outputs.value }}.jar
          cp starter/build/libs/starter-${{ steps.version.outputs.value }}.jar release-artifacts/spring-xpose-starter-${{ steps.version.outputs.value }}.jar

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.value) }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: release-artifacts/*.jar
