name: Publish to Maven Central
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build and publish to staging
        run: ./gradlew :annotations:publishMavenJavaPublicationToStagingRepository :processor:publishMavenJavaPublicationToStagingRepository :starter:publishMavenJavaPublicationToStagingRepository -Pversion=${{ steps.version.outputs.value }} -x javadoc
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Bundle staging into zip
        run: |
          mkdir -p bundle
          cd annotations/build/staging-deploy && zip -r ../../../bundle/annotations.zip . && cd -
          cd processor/build/staging-deploy  && zip -r ../../../bundle/processor.zip  . && cd -
          cd starter/build/staging-deploy    && zip -r ../../../bundle/starter.zip    . && cd -
          cd bundle && zip -r ../central-bundle.zip . && cd -

      - name: Upload bundle to Maven Central Portal
        run: |
          RESPONSE=$(curl --silent --show-error --fail \
            -u "${{ secrets.MAVEN_USERNAME }}:${{ secrets.MAVEN_PASSWORD }}" \
            -F "bundle=@central-bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")
          echo "Response: $RESPONSE"

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp annotations/build/libs/annotations-${{ steps.version.outputs.value }}.jar release-artifacts/spring-xpose-annotations-${{ steps.version.outputs.value }}.jar
          cp processor/build/libs/processor-${{ steps.version.outputs.value }}.jar   release-artifacts/spring-xpose-processor-${{ steps.version.outputs.value }}.jar
          cp starter/build/libs/starter-${{ steps.version.outputs.value }}.jar       release-artifacts/spring-xpose-starter-${{ steps.version.outputs.value }}.jar

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.value) }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: release-artifacts/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

