name: Publish to Maven Central
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Java 21 (use pre-installed runner JDK, bypass actions/setup-java CDN issue)
        run: |
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_21_X64/bin" >> $GITHUB_PATH
          java -version
      - uses: gradle/actions/setup-gradle@v6.1.0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            tag="${{ github.event.release.tag_name }}"
            echo "value=${tag#v}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Maven Central
        run: ./gradlew :annotations:publishAllPublicationsToCentralPortal :processor:publishAllPublicationsToCentralPortal :starter:publishAllPublicationsToCentralPortal -Pversion=${{ steps.version.outputs.value }} -x javadoc
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp annotations/build/libs/annotations-${{ steps.version.outputs.value }}.jar release-artifacts/spring-xpose-annotations-${{ steps.version.outputs.value }}.jar
          cp processor/build/libs/processor-${{ steps.version.outputs.value }}.jar   release-artifacts/spring-xpose-processor-${{ steps.version.outputs.value }}.jar
          cp starter/build/libs/starter-${{ steps.version.outputs.value }}.jar       release-artifacts/spring-xpose-starter-${{ steps.version.outputs.value }}.jar

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.value) }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: release-artifacts/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
