name: PR Build

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]

# Cancel any in-progress run for the same PR so pushes don't queue up
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── 1. Branch naming convention ─────────────────────────────────────────────
  branch-lint:
    name: Branch name
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH"
          if ! echo "$BRANCH" | grep -qE '^(feat|fix|docs|test|chore|refactor|ci|release)/[a-z0-9][a-z0-9\-]*[a-z0-9]$'; then
            echo "::error::Branch name '$BRANCH' does not follow the required pattern."
            echo "::error::Expected: <type>/<kebab-case-description>"
            echo "::error::Types: feat, fix, docs, test, chore, refactor, ci, release"
            echo "::error::Example: feat/pageable-find-all"
            exit 1
          fi

  # ── 2. PR title (Conventional Commits) ──────────────────────────────────────
  title-lint:
    name: PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows Conventional Commits
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $TITLE"
          if ! echo "$TITLE" | grep -qE '^(feat|fix|docs|test|chore|refactor|ci|perf|revert)(\([a-z]+\))?: .{1,72}$'; then
            echo "::error::PR title '$TITLE' does not follow Conventional Commits."
            echo "::error::Format: type(scope): short description"
            echo "::error::Types: feat, fix, docs, test, chore, refactor, ci, perf, revert"
            echo "::error::Scopes: annotations, processor, starter, sample, ci, docs"
            echo "::error::Example: feat(processor): add pageable support for findAll"
            exit 1
          fi

  # ── 3. Build & test ──────────────────────────────────────────────────────────
  test:
    name: Test — processor (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: [ branch-lint, title-lint ]
    strategy:
      fail-fast: false
      matrix:
        java: [ 21 ]          # extend to [21, 23] when you need forward-compat checks

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Compile all modules
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Run processor unit tests
        run: ./gradlew :processor:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ matrix.java }}
          path: |
            **/build/reports/tests/
            **/build/test-results/

  # ── 4. Build check — assemble JARs ──────────────────────────────────────────
  build-check:
    name: Build check — assemble JARs
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true

      - name: Assemble all JARs (no Javadoc)
        run: ./gradlew assemble -x javadoc --no-daemon

      - name: Verify no unexpected Gradle warnings
        run: |
          output=$(./gradlew assemble -x javadoc --no-daemon --warning-mode all 2>&1)
          echo "$output"
          if echo "$output" | grep -q "Deprecated Gradle features"; then
            echo "::warning::Deprecated Gradle features detected — review the output above."
          fi

      - name: Publish to local Maven (needed by sample)
        run: ./gradlew publishToMavenLocal -x javadoc --no-daemon

      - name: Upload built JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: '**/build/libs/*.jar'
          retention-days: 3

  # ── 5. Summary gate — all required checks must pass ──────────────────────────
  pr-gate:
    name: PR gate (all checks passed)
    runs-on: ubuntu-latest
    needs: [ branch-lint, title-lint, test, build-check ]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "::error::One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed ✅"

