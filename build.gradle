buildscript {
    repositories { gradlePluginPortal() }
    dependencies {
        classpath 'com.gradleup.nmcp:nmcp:0.0.9'
    }
}

allprojects {
    group = 'io.github.notablogger'
    version = project.findProperty('version') ?: '0.1.0-SNAPSHOT'
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
        withSourcesJar()
        withJavadocJar()
    }

    repositories {
        mavenCentral()
    }

    test {
        useJUnitPlatform()
        testLogging {
            showStandardStreams = true
            events "passed", "skipped", "failed"
        }
    }
}
